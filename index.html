<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesper & Linnéa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cormorant Garamond"', 'serif'],
            body: ['"Inter"', 'sans-serif'],
          },
          colors: {
            sand: {
              50: '#f7f5f0',
              200: '#d4cdc3',
              300: '#c9bfb2',
              400: '#c0b8ad',
              500: '#8a7e72',
              600: '#6b6158',
              700: '#5a544e',
              800: '#3a3632',
              900: '#2c2825',
            },
            error: '#a85a4a',
          }
        }
      }
    }
  </script>
</head>
<body class="font-body font-light bg-sand-50 text-sand-800 min-h-screen flex justify-center items-center px-4 py-8">

  <div class="max-w-md w-full text-center">
    <h1 class="font-display font-light text-5xl leading-tight tracking-tight text-sand-900 mb-1">
      Jesper <em class="italic font-light">&</em> Linnéa
    </h1>
    <p class="font-display text-xl tracking-wider text-sand-500 mb-10">gifter sig</p>
    <p class="text-sm font-normal uppercase tracking-[0.15em] text-sand-600 mb-12">Lördag 28 Augusti 2027</p>
    <div class="w-10 h-px bg-sand-300 mx-auto mb-12"></div>

    <form id="osa-form" class="space-y-5">
      <div class="text-left">
        <label for="namn" class="block text-[0.7rem] font-medium uppercase tracking-[0.12em] text-sand-500 mb-1">Namn</label>
        <input type="text" id="namn" name="namn" placeholder="Förnamn & efternamn" required
          class="w-full py-3 bg-transparent border-b border-sand-200 text-sand-900 font-light outline-none transition-colors duration-300 focus:border-sand-500 placeholder:text-sand-400">
      </div>

      <div class="text-left">
        <label for="email" class="block text-[0.7rem] font-medium uppercase tracking-[0.12em] text-sand-500 mb-1">Email</label>
        <input type="email" id="email" name="email" placeholder="din@email.se"
          class="w-full py-3 bg-transparent border-b border-sand-200 text-sand-900 font-light outline-none transition-colors duration-300 focus:border-sand-500 placeholder:text-sand-400">
      </div>

      <div class="text-left">
        <label for="bekraftelse" class="block text-[0.7rem] font-medium uppercase tracking-[0.12em] text-sand-500 mb-1">Kan du komma?</label>
        <select id="bekraftelse" name="bekraftelse" required
          class="w-full py-3 bg-transparent border-b border-sand-200 text-sand-900 font-light outline-none appearance-none cursor-pointer transition-colors duration-300 focus:border-sand-500 bg-[url('data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20width=%2712%27%20height=%277%27%3E%3Cpath%20d=%27M1%201l5%205%205-5%27%20stroke=%27%238a7e72%27%20fill=%27none%27%20stroke-width=%271.5%27/%3E%3C/svg%3E')] bg-no-repeat bg-[position:right_center]">
          <option value="" disabled selected>Välj ett alternativ</option>
          <option value="Ja">Ja, jag kommer</option>
          <option value="Nej">Nej, jag kan tyvärr inte</option>
        </select>
      </div>

      <div class="text-left">
        <label for="allergier" class="block text-[0.7rem] font-medium uppercase tracking-[0.12em] text-sand-500 mb-1">Matpreferenser / allergier</label>
        <input type="text" id="allergier" name="allergier" placeholder="T.ex. vegetarian, glutenfri..."
          class="w-full py-3 bg-transparent border-b border-sand-200 text-sand-900 font-light outline-none transition-colors duration-300 focus:border-sand-500 placeholder:text-sand-400">
      </div>

      <button type="submit"
        class="mt-8 w-full py-4 text-xs font-medium uppercase tracking-[0.18em] text-sand-50 bg-sand-800 hover:bg-sand-700 disabled:bg-sand-300 disabled:cursor-not-allowed cursor-pointer transition-colors duration-300">
        Skicka OSA
      </button>
    </form>

    <p id="confirmation" class="hidden mt-8 font-display text-xl italic text-sand-600">
      Tack! Vi har mottagit ditt svar.
    </p>
    <p id="error-msg" class="hidden mt-4 text-sm text-error">
      Något gick fel. Försök igen eller kontakta oss direkt.
    </p>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwp-Tx3bZQo84SQhSm4puGpl_W8bC4I5-uPIsJWhxda5ZoD_Sv7qfPzU2Hf__ohF9eItQ/exec';

    document.getElementById('osa-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Skickar...';

      const data = {
        namn: document.getElementById('namn').value,
        email: document.getElementById('email').value,
        bekraftelse: document.getElementById('bekraftelse').value,
        allergier: document.getElementById('allergier').value
      };

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        document.getElementById('osa-form').style.display = 'none';
        document.getElementById('confirmation').style.display = 'block';
      } catch (err) {
        document.getElementById('error-msg').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Skicka OSA';
      }
    });
  </script>
</body>
</html>
